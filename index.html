<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Ball Tower Defense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Press Start 2P', cursive;
    }

    /* ===================== */
    /* DEFAULT (PRETO/BRANCO) */
    /* ===================== */
    body {
      background: #050505;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* GRID VISÍVEL */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(#222 1px, transparent 1px),
        linear-gradient(90deg, #222 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      z-index: -3;
    }

    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      border-bottom: 1px solid #333;
    }

    .menu-btn {
      cursor: pointer;
    }

    .title {
      font-size: 12px;
    }

    /* MENU */
    .dropdown {
      position: absolute;
      top: 70px;
      left: 20px;
      background: #0d0d0d;
      border: 1px solid #333;
      box-shadow: 6px 6px 0px #222;
      padding: 15px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .dropdown.active {
      display: flex;
    }

    .dropdown button {
      background: none;
      border: 1px solid #333;
      color: white;
      padding: 8px;
      cursor: pointer;
      font-size: 10px;
    }

    .dropdown button:hover {
      background: white;
      color: black;
    }

    .hero {
      padding: 100px 20px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    p {
      font-size: 10px;
      color: #aaa;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      background: white;
      color: black;
      padding: 14px 35px;
      text-decoration: none;
      transform: skew(-10deg);
      box-shadow: 5px 5px 0px #333;
    }

    .btn span {
      display: inline-block;
      transform: skew(10deg);
      font-size: 11px;
    }

    .features {
      margin-top: 80px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 25px;
      padding: 20px;
    }

    .card {
      width: 260px;
      padding: 20px;
      background: #0d0d0d;
      transform: skew(-5deg);
      border: 1px solid #333;
      box-shadow: 6px 6px 0px #222;
    }

    .card * {
      transform: skew(5deg);
    }

    .card h3 {
      font-size: 10px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 9px;
      color: #bbb;
    }

    footer {
      margin-top: 100px;
      padding: 20px;
      font-size: 9px;
      color: #666;
      text-align: center;
    }

    /* ===================== */
    /* GRIM FIRE THEME */
    /* ===================== */
    body.grim {
      background: #001100;
      color: #aaffaa;
    }

    body.grim header {
      border-bottom: 1px solid #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }

    body.grim .btn {
      background: #00ff00;
      color: black;
      box-shadow: 0 0 15px #00ff00;
    }

    body.grim .card {
      border: 1px solid #00ff00;
      box-shadow: 0 0 12px #00ff00;
      background: #002200;
    }

    body.grim h1 {
      text-shadow: 0 0 15px #00ff00;
    }

    /* 🔥 BASE DO FOGO */
    .fire-base {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 40px;
      background: repeating-linear-gradient(
        0deg,
        #00ff00,
        #00ff00 4px,
        #007700 4px,
        #007700 8px
      );
      opacity: 0.5;
      z-index: -2;
      display: none;
    }

    body.grim .fire-base {
      display: block;
    }

    /* 🔥 PARTÍCULAS */
    .fire-container {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 120px;
      pointer-events: none;
      z-index: -1;
    }

    .pixel {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #00ff00;
      box-shadow: 0 0 10px #00ff00;
      animation: rise linear infinite;
    }

    @keyframes rise {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-120px); opacity: 0; }
    }
  </style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="title">ZENITH VALUES</div>
</header>

<div class="dropdown" id="menu">
  <button onclick="setTheme('default')">Default</button>
  <button onclick="setTheme('grim')">Grim Fire</button>
</div>

<div class="fire-base"></div>
<div class="fire-container" id="fire"></div>

<section class="hero">
  <h1>Ball Tower Defense</h1>
  <p>Retro roots. Cyber strategy. Pure defense action.</p>
  <a class="btn" href="#"><span>PLAY NOW</span></a>
</section>

<section class="features">
  <div class="card">
    <h3>CLASSIC CORE</h3>
    <p>Old-school Roblox gameplay.</p>
  </div>
  <div class="card">
    <h3>SMART STRATEGY</h3>
    <p>Upgrade and defend.</p>
  </div>
  <div class="card">
    <h3>ENDLESS WAVES</h3>
    <p>Enemies evolve.</p>
  </div>
</section>

<footer>
  © 2026 Zenith Values
</footer>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
  }

  function setTheme(theme) {
    const fire = document.getElementById("fire");
    fire.innerHTML = "";

    document.body.classList.remove("grim");

    if (theme === "grim") {
      document.body.classList.add("grim");

      for (let i = 0; i < 80; i++) {
        let p = document.createElement("div");
        p.className = "pixel";
        p.style.left = Math.random() * 100 + "%";
        p.style.animationDuration = (0.8 + Math.random()) + "s";
        fire.appendChild(p);
      }
    }
  }
</script>

</body>
</html>

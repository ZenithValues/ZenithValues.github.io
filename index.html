<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Ball Tower Defense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Press Start 2P', cursive;
    }

    body {
      background: #050505;
      color: white;
      transition: 0.3s;
    }

    /* GRID */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(#111 1px, transparent 1px),
                        linear-gradient(90deg, #111 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2;
      z-index: -2;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      border-bottom: 1px solid #222;
    }

    .menu-btn {
      cursor: pointer;
    }

    .title {
      font-size: 12px;
    }

    /* MENU */
    .dropdown {
      position: absolute;
      top: 70px;
      left: 20px;
      background: #0d0d0d;
      border: 1px solid #333;
      box-shadow: 6px 6px 0px #222;
      padding: 15px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .dropdown.active {
      display: flex;
    }

    .dropdown button {
      background: none;
      border: 1px solid #333;
      color: white;
      padding: 8px;
      cursor: pointer;
      font-size: 10px;
    }

    .dropdown button:hover {
      background: white;
      color: black;
    }

    /* HERO */
    .hero {
      padding: 100px 20px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    p {
      font-size: 10px;
      color: #aaa;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      background: white;
      color: black;
      padding: 14px 35px;
      text-decoration: none;
      transform: skew(-10deg);
      box-shadow: 5px 5px 0px #333;
    }

    .btn span {
      display: inline-block;
      transform: skew(10deg);
      font-size: 11px;
    }

    /* CARDS */
    .features {
      margin-top: 80px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 25px;
      padding: 20px;
    }

    .card {
      width: 260px;
      padding: 20px;
      background: #0d0d0d;
      transform: skew(-5deg);
      border: 1px solid #333;
      box-shadow: 6px 6px 0px #222;
    }

    .card * {
      transform: skew(5deg);
    }

    .card h3 {
      font-size: 10px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 9px;
      color: #bbb;
    }

    /* ===================== */
    /* 🔥 GRIM FIRE THEME */
    /* ===================== */

    .grim {
      color: #9bff9b;
    }

    .grim .btn {
      background: #00ff66;
      box-shadow: 5px 5px 0px #006633;
    }

    .grim .card {
      border: 1px solid #00ff66;
      box-shadow: 6px 6px 0px #003311;
    }

    .grim header {
      border-bottom: 1px solid #00ff66;
    }

    /* PIXEL FIRE */
    .fire {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      pointer-events: none;
      z-index: -1;
      background: repeating-linear-gradient(
        0deg,
        #00ff66,
        #00ff66 4px,
        transparent 4px,
        transparent 8px
      );
      animation: fireAnim 0.4s infinite;
      opacity: 0.2;
    }

    @keyframes fireAnim {
      0% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0); }
    }

  </style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="title">ZENITH VALUES</div>
</header>

<div class="dropdown" id="menu">
  <button onclick="setTheme('default')">Default</button>
  <button onclick="setTheme('grim')">Grim Fire</button>
</div>

<div id="fire"></div>

<section class="hero">
  <h1>Ball Tower Defense</h1>
  <p>Retro roots. Cyber strategy. Pure defense action.</p>
  <a class="btn" href="#"><span>PLAY NOW</span></a>
</section>

<section class="features">
  <div class="card">
    <h3>CLASSIC CORE</h3>
    <p>Inspired by old-school Roblox gameplay.</p>
  </div>
  <div class="card">
    <h3>SMART STRATEGY</h3>
    <p>Plan and upgrade your towers.</p>
  </div>
  <div class="card">
    <h3>ENDLESS WAVES</h3>
    <p>Enemies keep evolving.</p>
  </div>
</section>

<footer style="text-align:center; margin-top:100px; font-size:9px; color:#555;">
  © 2026 Zenith Values
</footer>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
  }

  function setTheme(theme) {
    document.body.className = "";

    const fire = document.getElementById("fire");

    if (theme === "grim") {
      document.body.classList.add("grim");
      fire.classList.add("fire");
    } else {
      fire.classList.remove("fire");
    }
  }
</script>

</body>
</html>

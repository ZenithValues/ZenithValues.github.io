<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Ball Tower Defense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Pixel Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Press Start 2P', cursive;
    }

    body {
      background: #050505;
      color: #ffffff;
    }

    /* GRID FUNDO */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(#111 1px, transparent 1px),
                        linear-gradient(90deg, #111 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2;
      z-index: -1;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      border-bottom: 1px solid #222;
    }

    /* MENU ICON */
    .menu-btn {
      font-size: 18px;
      cursor: pointer;
      user-select: none;
    }

    /* TITLE */
    .title {
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* DROPDOWN MENU */
    .dropdown {
      position: absolute;
      top: 70px;
      left: 20px;
      background: #0d0d0d;
      border: 1px solid #333;
      box-shadow: 6px 6px 0px #222;
      padding: 15px;
      display: none;
      flex-direction: column;
      gap: 10px;
      width: 200px;
    }

    .dropdown.active {
      display: flex;
    }

    .dropdown a {
      text-decoration: none;
      color: white;
      font-size: 10px;
      padding: 8px;
      border: 1px solid #333;
      transition: 0.2s;
    }

    .dropdown a:hover {
      background: white;
      color: black;
    }

    /* HERO */
    .hero {
      padding: 100px 20px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    p {
      font-size: 10px;
      color: #aaa;
      margin-bottom: 40px;
    }

    /* BUTTON */
    .btn {
      display: inline-block;
      background: #ffffff;
      color: black;
      padding: 14px 35px;
      text-decoration: none;
      transform: skew(-10deg);
      box-shadow: 5px 5px 0px #333;
      transition: 0.2s;
    }

    .btn span {
      display: inline-block;
      transform: skew(10deg);
      font-size: 11px;
    }

    .btn:hover {
      transform: skew(-10deg) translate(3px, 3px);
      box-shadow: 2px 2px 0px #333;
    }

    /* CARDS */
    .features {
      margin-top: 80px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 25px;
      padding: 20px;
    }

    .card {
      width: 260px;
      padding: 20px;
      background: #0d0d0d;
      transform: skew(-5deg);
      border: 1px solid #333;
      box-shadow: 6px 6px 0px #222;
      transition: 0.2s;
    }

    .card * {
      transform: skew(5deg);
    }

    .card:hover {
      transform: skew(-5deg) translateY(-5px);
      box-shadow: 10px 10px 0px #222;
    }

    .card h3 {
      font-size: 10px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 9px;
      color: #bbb;
    }

    footer {
      margin-top: 100px;
      padding: 20px;
      font-size: 9px;
      color: #555;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="title">ZENITH VALUES</div>
</header>

<div class="dropdown" id="menu">
  <a href="#">Omega</a>
  <a href="#">Transcendent</a>
  <a href="#">Mythic</a>
  <a href="#">Legendary</a>
</div>

<section class="hero">
  <h1>Ball Tower Defense</h1>
  <p>Retro roots. Cyber strategy. Pure defense action.</p>

  <a class="btn" href="#"><span>PLAY NOW</span></a>
</section>

<section class="features">
  <div class="card">
    <h3>CLASSIC CORE</h3>
    <p>Inspired by old-school Roblox gameplay.</p>
  </div>

  <div class="card">
    <h3>SMART STRATEGY</h3>
    <p>Plan and upgrade your towers.</p>
  </div>

  <div class="card">
    <h3>ENDLESS WAVES</h3>
    <p>Enemies keep evolving.</p>
  </div>
</section>

<footer>
  © 2026 Zenith Values
</footer>

<script>
  function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.classList.toggle("active");
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Ball Tower Defense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #00ffcc;
      border-bottom: 2px solid #00ffcc;
    }

    .hero {
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 15px;
    }

    .hero p {
      color: #ccc;
      margin-bottom: 40px;
    }

    .btn {
      background: #00ffcc;
      color: black;
      padding: 14px 40px;
      border-radius: 8px; /* mais quadrado (retro) */
      font-weight: 700;
      text-decoration: none;
      box-shadow: 4px 4px 0px #008f7a; /* sombra estilo retro */
      transition: 0.2s;
    }

    .btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #008f7a;
    }

    .features {
      margin-top: 80px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 6px; /* menos arredondado (retro) */
      width: 250px;
      border: 2px solid #00ffcc;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #00ffcc;
    }

    footer {
      margin-top: 80px;
      padding: 20px;
      color: #666;
    }
  </style>
</head>

<body>

<header>ZENITH VALUES</header>

<section class="hero">
  <h1>Ball Tower Defense</h1>
  <p>Classic vibes. Modern strategy. Pure defense action.</p>
  <a class="btn" href="#">Play Now</a>
</section>

<section class="features">
  <div class="card">
    <h3>Classic Feel</h3>
    <p>Inspired by old-school Roblox gameplay.</p>
  </div>

  <div class="card">
    <h3>Modern Strategy</h3>
    <p>Upgrade and plan your defense smartly.</p>
  </div>

  <div class="card">
    <h3>Endless Waves</h3>
    <p>Face enemies that keep getting stronger.</p>
  </div>
</section>

<footer>
  © 2026 Zenith Values
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Zenith Values</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Montserrat Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: linear-gradient(180deg, #0a0a0a 0%, #111 100%);
      color: #fff;
      text-align: center;
    }

    header {
      padding: 30px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #aaa;
    }

    .hero {
      padding: 120px 20px;
      max-width: 900px;
      margin: auto;
    }

    .hero h1 {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 40px;
    }

    .btn {
      background: linear-gradient(135deg, #00ffcc, #00ccaa);
      color: black;
      padding: 14px 35px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(0,255,200,0.3);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 30px rgba(0,255,200,0.6);
    }

    footer {
      margin-top: 120px;
      padding: 20px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

<header>ZENITH VALUES</header>

<section class="hero">
  <h1>Smart tools<br>for your growth</h1>
  <p>Simulators, calculators, and resources to improve your studies and life.</p>
  <a class="btn" href="#">Get Started</a>
</section>

<footer>
  © 2026 Zenith Values
</footer>

</body>
</html>

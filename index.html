<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Ball Tower Defense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Pixel font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Press Start 2P', cursive;
    }

    body {
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    header {
      padding: 25px;
      font-size: 12px;
      letter-spacing: 3px;
      color: #00ffcc;
      border-bottom: 2px solid #00ffcc;
    }

    .hero {
      padding: 100px 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    p {
      font-size: 10px;
      line-height: 1.6;
      color: #aaa;
      margin-bottom: 40px;
    }

    /* BOTÃO CYBER PIXEL */
    .btn {
      display: inline-block;
      background: #00ffcc;
      color: black;
      padding: 14px 35px;
      text-decoration: none;

      transform: skew(-10deg);

      box-shadow: 5px 5px 0px #008f7a;
      transition: 0.2s;
    }

    .btn span {
      display: inline-block;
      transform: skew(10deg);
      font-size: 11px;
    }

    .btn:hover {
      transform: skew(-10deg) translate(3px, 3px);
      box-shadow: 2px 2px 0px #008f7a;
    }

    /* FEATURES */
    .features {
      margin-top: 80px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 25px;
      padding: 20px;
    }

    /* CARD CYBER PIXEL */
    .card {
      width: 260px;
      padding: 20px;
      background: #1a1a1a;

      transform: skew(-5deg);

      border: 2px solid #00ffcc;

      box-shadow: 6px 6px 0px #008f7a;
    }

    .card * {
      transform: skew(5deg);
    }

    .card h3 {
      font-size: 10px;
      margin-bottom: 10px;
      color: #00ffcc;
      letter-spacing: 1px;
    }

    .card p {
      font-size: 9px;
      color: #bbb;
    }

    footer {
      margin-top: 100px;
      padding: 20px;
      font-size: 9px;
      color: #666;
    }
  </style>
</head>

<body>

<header>ZENITH VALUES</header>

<section class="hero">
  <h1>Ball Tower Defense</h1>
  <p>Retro roots. Cyber strategy. Pure defense action.</p>

  <a class="btn" href="#"><span>PLAY NOW</span></a>
</section>

<section class="features">
  <div class="card">
    <h3>CLASSIC CORE</h3>
    <p>Inspired by old-school Roblox gameplay.</p>
  </div>

  <div class="card">
    <h3>SMART STRATEGY</h3>
    <p>Plan and upgrade your towers.</p>
  </div>

  <div class="card">
    <h3>ENDLESS WAVES</h3>
    <p>Enemies keep evolving.</p>
  </div>
</section>

<footer>
  © 2026 Zenith Values
</footer>

</body>
</html>

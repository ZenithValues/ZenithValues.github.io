<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Ball Tower Defense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Press Start 2P', cursive;
    }

    body {
      background: #050505;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* GRID (fundo mais baixo de todos) */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(#222 1px, transparent 1px),
        linear-gradient(90deg, #222 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      border-bottom: 1px solid #333;
      background: #050505;
    }

    .menu-btn {
      cursor: pointer;
    }

    .title {
      font-size: 12px;
    }

    /* MENU */
    .dropdown {
      position: absolute;
      top: 70px;
      left: 20px;
      background: #0d0d0d;
      border: 1px solid #333;
      box-shadow: 6px 6px 0px #222;
      padding: 15px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
    }

    .dropdown.active {
      display: flex;
    }

    .dropdown button {
      background: none;
      border: 1px solid #333;
      color: white;
      padding: 8px;
      cursor: pointer;
      font-size: 10px;
    }

    .dropdown button:hover {
      background: white;
      color: black;
    }

    /* CONTEÚDO ACIMA DAS PARTICULAS */
    main {
      position: relative;
      z-index: 5;
    }

    .hero {
      padding: 100px 20px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    p {
      font-size: 10px;
      color: #aaa;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      background: white;
      color: black;
      padding: 14px 35px;
      text-decoration: none;
      transform: skew(-10deg);
      box-shadow: 5px 5px 0px #333;
    }

    .btn span {
      display: inline-block;
      transform: skew(10deg);
      font-size: 11px;
    }

    .features {
      margin-top: 80px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 25px;
      padding: 20px;
    }

    .card {
      width: 260px;
      padding: 20px;
      background: #0d0d0d;
      transform: skew(-5deg);
      border: 1px solid #333;
      box-shadow: 6px 6px 0px #222;
    }

    .card * {
      transform: skew(5deg);
    }

    /* FOOTER NÃO BLOQUEIA MAIS */
    footer {
      position: relative;
      z-index: 5;
      margin-top: 100px;
      padding: 20px;
      font-size: 9px;
      color: #666;
      text-align: center;
      background: transparent;
    }

    /* ===================== */
    /* GRIM */
    /* ===================== */

    body.grim {
      background: #001100;
      color: #aaffaa;
    }

    body.grim header {
      background: #001100;
      border-bottom: 1px solid #00ff00;
    }

    body.grim .card {
      background: #000a00;
      border: 1px solid #00ff00;
      box-shadow: 0 0 10px #00ff00;
    }

    body.grim .btn {
      background: #00ff00;
      box-shadow: 0 0 12px #00ff00;
    }

    body.grim h1 {
      text-shadow: 0 0 10px #00ff00;
    }

    /* 🔥 PARTICULAS (AGORA ENTRE FUNDO E CONTEÚDO) */
    .particles {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 80px;
      pointer-events: none;
      overflow: hidden;
      z-index: 2; /* CHAVE */
    }

    .pixel {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #00ff00;
      opacity: 0.9;

      box-shadow:
        0 0 4px #00ff00,
        0 0 8px #00ff00;

      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 0.9; }
      100% { transform: translateY(-50px); opacity: 0; }
    }

  </style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="title">ZENITH VALUES</div>
</header>

<div class="dropdown" id="menu">
  <button onclick="setTheme('default')">Default</button>
  <button onclick="setTheme('grim')">Grim Fire</button>
</div>

<!-- 🔥 PARTÍCULAS -->
<div class="particles" id="particles"></div>

<main>
  <section class="hero">
    <h1>Ball Tower Defense</h1>
    <p>Retro roots. Cyber strategy. Pure defense action.</p>
    <a class="btn" href="#"><span>PLAY NOW</span></a>
  </section>

  <section class="features">
    <div class="card">
      <h3>CLASSIC CORE</h3>
      <p>Old-school Roblox gameplay.</p>
    </div>
    <div class="card">
      <h3>SMART STRATEGY</h3>
      <p>Upgrade and defend.</p>
    </div>
    <div class="card">
      <h3>ENDLESS WAVES</h3>
      <p>Enemies evolve.</p>
    </div>
  </section>

  <footer>
    © 2026 Zenith Values
  </footer>
</main>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
  }

  function setTheme(theme) {
    const particles = document.getElementById("particles");
    particles.innerHTML = "";

    document.body.classList.remove("grim");

    if (theme === "grim") {
      document.body.classList.add("grim");

      for (let i = 0; i < 120; i++) {
        let p = document.createElement("div");
        p.className = "pixel";
        p.style.left = Math.random() * 100 + "%";
        p.style.animationDuration = (2 + Math.random() * 2) + "s";
        particles.appendChild(p);
      }
    }
  }
</script>

</body>
</html>

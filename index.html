<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Ball Tower Defense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Press Start 2P', cursive;
    }

    body {
      background: #000000;
      color: #ffffff;
      transition: 0.3s;
      overflow-x: hidden;
    }

    /* GRID */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(#111 1px, transparent 1px),
                        linear-gradient(90deg, #111 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2;
      z-index: -3;
    }

    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      border-bottom: 1px solid #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }

    .menu-btn {
      cursor: pointer;
      font-size: 16px;
    }

    .title {
      font-size: 12px;
    }

    /* MENU */
    .dropdown {
      position: absolute;
      top: 70px;
      left: 20px;
      background: #001a00;
      border: 1px solid #00ff00;
      box-shadow: 0 0 10px #00ff00;
      padding: 15px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .dropdown.active {
      display: flex;
    }

    .dropdown button {
      background: black;
      border: 1px solid #00ff00;
      color: #00ff00;
      padding: 8px;
      cursor: pointer;
      font-size: 10px;
    }

    .dropdown button:hover {
      background: #00ff00;
      color: black;
    }

    .hero {
      padding: 100px 20px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      text-shadow: 0 0 15px #00ff00;
    }

    p {
      font-size: 10px;
      color: #88ff88;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      background: #00ff00;
      color: black;
      padding: 14px 35px;
      text-decoration: none;
      transform: skew(-10deg);
      box-shadow: 0 0 15px #00ff00;
    }

    .btn span {
      display: inline-block;
      transform: skew(10deg);
      font-size: 11px;
    }

    .features {
      margin-top: 80px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 25px;
      padding: 20px;
    }

    .card {
      width: 260px;
      padding: 20px;
      background: #001100;
      transform: skew(-5deg);
      border: 1px solid #00ff00;
      box-shadow: 0 0 10px #00ff00;
    }

    .card * {
      transform: skew(5deg);
    }

    .card h3 {
      font-size: 10px;
      margin-bottom: 10px;
      color: #00ff00;
    }

    .card p {
      font-size: 9px;
      color: #aaffaa;
    }

    footer {
      margin-top: 100px;
      padding: 20px;
      font-size: 9px;
      color: #00ff00;
      text-align: center;
    }

    /* 🔥 PIXEL FIRE PARTICLES */
    .fire-container {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 120px;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .pixel {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #00ff00;
      box-shadow: 0 0 8px #00ff00;
      animation: rise linear infinite;
    }

    @keyframes rise {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-120px);
        opacity: 0;
      }
    }

  </style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="title">ZENITH VALUES</div>
</header>

<div class="dropdown" id="menu">
  <button onclick="setTheme('default')">Default</button>
  <button onclick="setTheme('grim')">Grim Fire</button>
</div>

<div class="fire-container" id="fire"></div>

<section class="hero">
  <h1>Ball Tower Defense</h1>
  <p>Retro roots. Cyber strategy. Pure defense action.</p>
  <a class="btn" href="#"><span>PLAY NOW</span></a>
</section>

<section class="features">
  <div class="card">
    <h3>CLASSIC CORE</h3>
    <p>Old-school Roblox gameplay.</p>
  </div>
  <div class="card">
    <h3>SMART STRATEGY</h3>
    <p>Upgrade and defend.</p>
  </div>
  <div class="card">
    <h3>ENDLESS WAVES</h3>
    <p>Enemies evolve.</p>
  </div>
</section>

<footer>
  © 2026 Zenith Values
</footer>

<script>
  function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
  }

  function setTheme(theme) {
    const fire = document.getElementById("fire");
    fire.innerHTML = "";

    if (theme === "grim") {
      for (let i = 0; i < 60; i++) {
        let p = document.createElement("div");
        p.className = "pixel";
        p.style.left = Math.random() * 100 + "%";
        p.style.animationDuration = (1 + Math.random()) + "s";
        fire.appendChild(p);
      }
    }
  }
</script>

</body>
</html>
